openapi: 3.0.3
info:
  title: Order Service API
  description: |
    Manages the full order lifecycle from placement through delivery.
    On creation the service calls Restaurant Service to verify items and calculate totals.
    Status updates are propagated back to Delivery Service and optionally to a Notification Service.
  version: 1.0.0

servers:
  - url: https://food-delivery-order-6hzh.onrender.com
    description: Render (production)
  - url: http://localhost:3003
    description: Local development
  - url: http://localhost/api/orders
    description: Via Nginx API Gateway (local)

tags:
  - name: Orders
    description: Order management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
        message:
          type: string

    OrderItem:
      type: object
      properties:
        menuItemId:
          type: string
        name:
          type: string
          example: "Kottu Roti"
        quantity:
          type: integer
          minimum: 1
          example: 2
        unitPrice:
          type: number
          format: float
          example: 8.50

    Order:
      type: object
      properties:
        _id:
          type: string
        customerId:
          type: string
        restaurantId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: float
          example: 17.00
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, picked_up, delivered]
          example: pending
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [restaurantId, items]
      properties:
        restaurantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [menuItemId, quantity]
            properties:
              menuItemId:
                type: string
                example: "64f1a2b3c4d5e6f7a8b9c0e2"
              quantity:
                type: integer
                minimum: 1
                example: 2

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, picked_up, delivered]

paths:
  /health:
    get:
      tags: [Orders]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /orders:
    post:
      tags: [Orders]
      summary: Place a new order
      description: |
        Requires `customer` role. The service calls Restaurant Service to validate items
        and compute `totalAmount`. Status starts as `pending`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '400':
          description: Validation error or unavailable menu item
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – only customers can place orders

    get:
      tags: [Orders]
      summary: Get the authenticated customer's orders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized

  /orders/restaurant/{restaurantId}:
    get:
      tags: [Orders]
      summary: Get all orders for a restaurant
      description: Requires `restaurant_owner` role.
      security:
        - BearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Orders for this restaurant
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get a single order
      description: Accessible by the customer who placed it, any restaurant_owner, any delivery_driver, or admin.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '403':
          description: Forbidden
        '404':
          description: Not found

  /orders/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status
      description: |
        Allowed roles: `restaurant_owner`, `delivery_driver`, `admin`.
        Status can only move **forward** in the flow:
        `pending → confirmed → preparing → ready → picked_up → delivered`.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '400':
          description: Invalid status transition (backwards move)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Order not found
