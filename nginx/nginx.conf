server {
    listen 80;
    server_name _;

    location = /docs/auth {
        return 301 /docs/auth/;
    }

    location ^~ /docs/auth/ {
        rewrite ^/docs/auth/?(.*)$ /api-docs/$1 break;
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /docs/restaurants {
        return 301 /docs/restaurants/;
    }

    location ^~ /docs/restaurants/ {
        rewrite ^/docs/restaurants/?(.*)$ /api-docs/$1 break;
        proxy_pass http://restaurant-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /docs/orders {
        return 301 /docs/orders/;
    }

    location ^~ /docs/orders/ {
        rewrite ^/docs/orders/?(.*)$ /api-docs/$1 break;
        proxy_pass http://order-service:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /docs/delivery {
        return 301 /docs/delivery/;
    }

    location ^~ /docs/delivery/ {
        rewrite ^/docs/delivery/?(.*)$ /api-docs/$1 break;
        proxy_pass http://delivery-service:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/auth {
        rewrite ^/api/auth/?(.*)$ /auth/$1 break;
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location ^~ /api/restaurants {
        rewrite ^/api/restaurants/?(.*)$ /restaurants/$1 break;
        proxy_pass http://restaurant-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location ^~ /api/orders {
        rewrite ^/api/orders/?(.*)$ /orders/$1 break;
        proxy_pass http://order-service:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location ^~ /api/delivery {
        rewrite ^/api/delivery/?(.*)$ /delivery/$1 break;
        proxy_pass http://delivery-service:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
