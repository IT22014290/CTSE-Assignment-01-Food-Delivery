name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - .github/workflows/frontend-service.yml

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/food-delivery-frontend:latest
            595260679779.dkr.ecr.eu-north-1.amazonaws.com/food-delivery-frontend:latest

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=food-delivery-frontend
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=src/test
            -Dsonar.test.inclusions=src/test/**/*.test.jsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "::warning title=Render deploy skipped::Set repository secret RENDER_DEPLOY_HOOK_FRONTEND to enable frontend deployment."
            exit 0
          fi
          curl -f -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster food-delivery-cluster1 \
            --service food-delivery-service-frontend \
            --force-new-deployment \
            --region eu-north-1
