name: Auth Service CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - auth-service/**
      - .github/workflows/auth-service.yml

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: auth-service
        run: npm install

      - name: Run tests
        working-directory: auth-service
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/food-delivery-auth:latest
            595260679779.dkr.ecr.eu-north-1.amazonaws.com/food-delivery-auth:latest

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: auth-service
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Deploy to Render
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}"

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster food-delivery-cluster1 \
            --service food-delivery-auth \
            --force-new-deployment \
            --region eu-north-1
