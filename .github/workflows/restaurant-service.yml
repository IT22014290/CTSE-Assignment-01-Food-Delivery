name: Restaurant Service CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - restaurant-service/**
      - .github/workflows/restaurant-service.yml

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: restaurant-service
        run: npm install

      - name: Run tests
        working-directory: restaurant-service
        run: npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./restaurant-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-delivery-restaurant:latest

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: restaurant-service
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Deploy to Render
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_RESTAURANT }}"
