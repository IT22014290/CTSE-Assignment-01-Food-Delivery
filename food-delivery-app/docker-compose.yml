version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: food-delivery-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      - mongodb

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    restart: unless-stopped
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/restaurant_db
      AUTH_SERVICE_URL: http://auth-service:3001
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      - mongodb
      - auth-service

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/order_db
      AUTH_SERVICE_URL: http://auth-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      - mongodb
      - auth-service
      - restaurant-service

  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    restart: unless-stopped
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/delivery_db
      AUTH_SERVICE_URL: http://auth-service:3001
      ORDER_SERVICE_URL: http://order-service:3003
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      - mongodb
      - auth-service
      - order-service

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      - auth-service
      - restaurant-service
      - order-service
      - delivery-service

  nginx:
    image: nginx:1.27-alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - restaurant-service
      - order-service
      - delivery-service

volumes:
  mongo_data:
