openapi: 3.0.3
info:
  title: Restaurant Service API
  description: |
    Manages restaurants and their menus. Publicly readable; write operations
    require a `restaurant_owner` JWT issued by the Auth Service.
  version: 1.0.0

servers:
  - url: https://food-delivery-restaurant.onrender.com
    description: Render (production)
  - url: http://localhost:3002
    description: Local development
  - url: http://localhost/api/restaurants
    description: Via Nginx API Gateway (local)

tags:
  - name: Restaurants
    description: Restaurant CRUD
  - name: Menu
    description: Menu item management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
        message:
          type: string

    Restaurant:
      type: object
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Spice Garden"
        category:
          type: string
          example: "Asian"
        address:
          type: string
          example: "12 Main Street, Colombo"
        description:
          type: string
          example: "Authentic Sri Lankan cuisine"
        rating:
          type: number
          format: float
          example: 4.5
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MenuItem:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: "Kottu Roti"
        category:
          type: string
          example: "Mains"
        price:
          type: number
          format: float
          example: 8.50
        description:
          type: string
        isAvailable:
          type: boolean
          default: true
        restaurantId:
          type: string

    CreateRestaurantRequest:
      type: object
      required: [name, category, address]
      properties:
        name:
          type: string
          example: "Spice Garden"
        category:
          type: string
          example: "Asian"
        address:
          type: string
          example: "12 Main Street, Colombo"
        description:
          type: string

    CreateMenuItemRequest:
      type: object
      required: [name, category, price]
      properties:
        name:
          type: string
          example: "Kottu Roti"
        category:
          type: string
          example: "Mains"
        price:
          type: number
          format: float
          minimum: 0
          example: 8.50
        description:
          type: string

paths:
  /health:
    get:
      tags: [Restaurants]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /restaurants:
    get:
      tags: [Restaurants]
      summary: List all restaurants (supports search and category filter)
      parameters:
        - name: q
          in: query
          description: Search by restaurant name (case-insensitive)
          schema:
            type: string
        - name: category
          in: query
          description: Filter by cuisine category
          schema:
            type: string
            example: Asian
      responses:
        '200':
          description: List of restaurants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Restaurant'

    post:
      tags: [Restaurants]
      summary: Create a new restaurant
      description: Requires `restaurant_owner` role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '201':
          description: Restaurant created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Restaurant'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – not a restaurant_owner

  /restaurants/{id}:
    get:
      tags: [Restaurants]
      summary: Get a single restaurant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Restaurant'
        '404':
          description: Restaurant not found

    put:
      tags: [Restaurants]
      summary: Update a restaurant
      description: Owner only. Validates ownership against `ownerId`.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '200':
          description: Restaurant updated
        '403':
          description: Not owner
        '404':
          description: Not found

  /restaurants/{id}/menu:
    get:
      tags: [Menu]
      summary: Get all menu items for a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Menu items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MenuItem'

    post:
      tags: [Menu]
      summary: Add a menu item
      description: Requires `restaurant_owner` role and ownership of the restaurant.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuItemRequest'
      responses:
        '201':
          description: Menu item created
        '401':
          description: Unauthorized
        '403':
          description: Not owner
        '404':
          description: Restaurant not found

  /restaurants/{id}/menu/{itemId}:
    put:
      tags: [Menu]
      summary: Update a menu item
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                isAvailable:
                  type: boolean
      responses:
        '200':
          description: Updated
        '404':
          description: Not found

    delete:
      tags: [Menu]
      summary: Delete a menu item
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found
